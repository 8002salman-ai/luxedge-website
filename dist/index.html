s",isActive:!0,subs:[]},{id:"c5",name:"Style",isActive:!0,subs:[]}],pb=[{id:"b1",slug:"top-5-tech-gadgets-2025",title:"Top 5 Tech Gadgets You Need in 2025",excerpt:"From smart earbuds to next-gen smartwatches, here are the must-have tech products this year.",content:`Technology is evolving rapidly, and 2025 brings some incredible innovations to everyday life.

## 1. Wireless Earbuds with ANC
Noise-cancelling earbuds have become essential. The ProSound Elite offers crystal-clear audio with 36-hour battery life.

## 2. Health-Focused Smartwatches
The LuxeTime Pro tracks heart rate, sleep, and 100+ workouts while looking premium on your wrist.

## 3. Smart Lighting
LED desk lamps like the AuraGlow transform your workspace with 16 million colors controlled via app.

## 4. Ergonomic Laptop Stands
Work-from-home setups demand proper posture. Aluminum stands improve airflow and reduce neck strain.

## 5. Portable Fitness Gear
Resistance bands and compact equipment let you work out anywhere without a gym membership.`,image:"https://images.pexels.com/photos/3780681/pexels-photo-3780681.jpeg?auto=compress&cs=tinysrgb&w=800",images:[],tags:["tech","gadgets","2025"],authorId:"adm",authorName:"Admin",status:"published",date:"2025-03-10"},{id:"b2",slug:"how-to-create-perfect-workspace",title:"How to Create the Perfect Home Workspace",excerpt:"Tips for building a productive and stylish home office that boosts your focus.",content:`Working from home is here to stay. Here's how to create a workspace that makes you actually want to sit down and be productive.

## Choose the Right Desk
Your desk is your foundation. Go for something spacious with cable management.

## Lighting Matters
Natural light is king, but a smart LED lamp like the AuraGlow adds ambient warmth for evening work sessions.

## Invest in Ergonomics
A good laptop stand, ergonomic chair, and proper monitor height prevent back pain and improve focus.

## Keep It Minimal
